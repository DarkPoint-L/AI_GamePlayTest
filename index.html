<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WebDungeon - 第一人称地牢探险</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        /* 准星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
            pointer-events: none;
        }
        /* UI提示 */
        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer; z-index: 10;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #ff4d4d; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
    <!-- 引入 Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instructions">
        <h1 style="font-size: 48px; color: #ddd;">Web Dungeon Crawler</h1>
        <p style="font-size: 20px;">点击屏幕进入地牢</p>
        <p style="color: #aaa;">WASD = 移动 | 鼠标 = 环顾四周<br>左键 = 近战挥砍 | 右键 = 发射法术</p>
    </div>

    <div id="crosshair"></div>
    <div id="hud">⚔️ 准备战斗</div>
    <div id="canvas-container"></div>

    <script>
        // --- 核心变量 ---
        let scene, camera, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        
        // 游戏对象管理
        let projectiles = [];
        let enemies = [];
        let swordMesh;
        let isAttacking = false;

        // 视角控制参数
        let pitchObject = new THREE.Object3D();
        let yawObject = new THREE.Object3D();

        const container = document.getElementById('canvas-container');
        const instructions = document.getElementById('instructions');

        // --- 初始化 Pointer Lock (鼠标锁定机制) ---
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else {
                instructions.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement !== document.body) return;

            const movementX = event.movementX || 0;
            const movementY = event.movementY || 0;

            yawObject.rotation.y -= movementX * 0.002;
            pitchObject.rotation.x -= movementY * 0.002;
            pitchObject.rotation.x = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitchObject.rotation.x));
        });

        // --- 初始化 3D 场景 ---
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0a10, 0.08); // 远端战争迷雾

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // 组装相机层级结构用于视线控制
            pitchObject.add(camera);
            yawObject.add(pitchObject);
            yawObject.position.y = 1.6; // 设定人类等身视线高度
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a10);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 监听键盘
            window.addEventListener('keydown', (e) => handleKeyboard(e.code, true));
            window.addEventListener('keyup', (e) => handleKeyboard(e.code, false));
            window.addEventListener('mousedown', handleMouseClick);
            window.addEventListener('contextmenu', e => e.preventDefault()); // 禁用右键菜单

            buildDungeon();
            createPlayerWeapon();
            spawnEnemySkeleton(0, 0, -6); // 在正前方生成一只骷髅木桩

            animate();
        }

        // --- 构筑暗黑地牢环境 ---
        function buildDungeon() {
            // 环境微弱阴暗光照
            const ambientLight = new THREE.AmbientLight(0x111118);
            scene.add(ambientLight);

            // 玩家手持的火把（动态点光源）
            const torchLight = new THREE.PointLight(0xffaa44, 2, 12);
            torchLight.castShadow = true;
            pitchObject.add(torchLight); // 绑定在第一人称相机上

            // 创建复古斑驳的地砖
            const floorGeo = new THREE.PlaneGeometry(40, 40);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222225, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 建造一些地下城石柱
            const pillarGeo = new THREE.BoxGeometry(1, 4, 1);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x33333a, roughness: 0.9 });
            
            const positions = [[-4, -4], [-4, 4], [4, -4], [4, 4]];
            positions.forEach(pos => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(pos[0], 2, pos[1]);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
            });
        }

        // --- 第一人称手持武器 ---
        function createPlayerWeapon() {
            const swordGroup = new THREE.Group();
            
            // 剑刃
            const bladeGeo = new THREE.BoxGeometry(0.03, 0.6, 0.01);
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.y = 0.3;
            swordGroup.add(blade);

            // 剑柄
            const hiltGeo = new THREE.BoxGeometry(0.12, 0.02, 0.02);
            const hiltMat = new THREE.MeshStandardMaterial({ color: 0x553311 });
            const hilt = new THREE.Mesh(hiltGeo, hiltMat);
            swordGroup.add(hilt);

            // 将剑固定在屏幕右下方
            swordGroup.position.set(0.25, -0.25, -0.4);
            swordGroup.rotation.set(0.2, 0.2, -0.2);
            camera.add(swordGroup);
            swordMesh = swordGroup;
        }

        // --- 生成骷髅兵木桩 ---
        function spawnEnemySkeleton(x, y, z) {
            const skeletonGroup = new THREE.Group();
            
            // 头颅
            const skullGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const boneMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 0.7 });
            const skull = new THREE.Mesh(skullGeo, boneMat);
            skull.position.y = 1.6;
            skeletonGroup.add(skull);

            // 肋骨躯干
            const bodyGeo = new THREE.BoxGeometry(0.5, 0.8, 0.2);
            const body = new THREE.Mesh(bodyGeo, boneMat);
            body.position.y = 1.0;
            skeletonGroup.add(body);

            skeletonGroup.position.set(x, y, z);
            scene.add(skeletonGroup);

            enemies.push({
                mesh: skeletonGroup,
                hp: 100,
                originalZ: z
            });
        }

        // --- 键盘与鼠标事件处理 ---
        function handleKeyboard(code, isDown) {
            switch (code) {
                case 'KeyW': moveForward = isDown; break;
                case 'KeyS': moveBackward = isDown; break;
                case 'KeyA': moveLeft = isDown; break;
                case 'KeyD': moveRight = isDown; break;
            }
        }

        function handleMouseClick(event) {
            if (document.pointerLockElement !== document.body) return;

            if (event.button === 0 && !isAttacking) { 
                // 左键：近战挥砍
                isAttacking = true;
                document.getElementById('hud').innerText = "⚔️ 挥砍！";
                performMeleeAttack();
            } else if (event.button === 2) { 
                // 右键：发射火球术
                castFireball();
            }
        }

        // --- 战斗逻辑与打击反馈 ---
        function performMeleeAttack() {
            // 简单利用 Raycaster 检测正面是否有怪
            const raycaster = new THREE.Raycaster();
            const center = new THREE.Vector2(0, 0); // 屏幕正中心
            raycaster.setFromCamera(center, camera);

            // 检查 2.5 米范围内的敌人
            const targetEnemy = enemies[0];
            if (targetEnemy) {
                const distance = yawObject.position.distanceTo(targetEnemy.mesh.position);
                if (distance < 2.5) {
                    targetEnemy.hp -= 25;
                    document.getElementById('hud').innerText = `💥 击中骷髅！敌方HP: ${targetEnemy.hp}`;
                    
                    // 反馈A：受击物理后退 (Knockback)
                    targetEnemy.mesh.position.z -= 0.3;
                    
                    // 反馈B：相机打击抖动 (Hit Shake)
                    camera.position.y += 0.05;
                    setTimeout(() => camera.position.y = 0, 50);

                    if (targetEnemy.hp <= 0) {
                        scene.remove(targetEnemy.mesh);
                        document.getElementById('hud').innerText = "💀 骷髅被消灭！";
                    }
                }
            }
        }

        function castFireball() {
            // 生成一个发光火球
            const ballGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const ballMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });
            const fireball = new THREE.Mesh(ballGeo, ballMat);

            // 火球初始光照
            const fireLight = new THREE.PointLight(0xff4500, 1, 3);
            fireball.add(fireLight);

            // 设定发射位置
            fireball.position.copy(yawObject.position);
            fireball.position.y += 0.2; // 从手部高度发射

            // 获取相机朝向向量
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);

            scene.add(fireball);
            projectiles.push({ mesh: fireball, dir: dir, life: 100 });
            document.getElementById('hud').innerText = "🔥 火球术！";
        }

        // --- 主循环：渲染与动画驱动 ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (document.pointerLockElement === document.body) {
                // --- 1. 角色移动计算 ---
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                yawObject.translateX(-velocity.x * delta);
                yawObject.translateZ(-velocity.z * delta);
                yawObject.position.y = 1.6; // 稳固地面高度

                // --- 2. 近战挥剑动画状态机 ---
                if (isAttacking) {
                    swordMesh.rotation.z += 0.3;
                    if (swordMesh.rotation.z > 1.2) {
                        isAttacking = false;
                        swordMesh.rotation.set(0.2, 0.2, -0.2); // 重置武器姿态
                    }
                }

                // --- 3. 法术弹道推进与销毁 ---
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.mesh.position.addScaledVector(p.dir, 12 * delta); // 火球速度
                    p.life--;

                    // 简单碰撞检测
                    const enemy = enemies[0];
                    if (enemy && p.mesh.position.distanceTo(enemy.mesh.position) < 0.8) {
                        enemy.hp -= 15;
                        enemy.mesh.position.z -= 0.1; // 轻微击退
                        document.getElementById('hud').innerText = `💥 魔法轰炸！敌方HP: ${enemy.hp}`;
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                        continue;
                    }

                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                    }
                }

                // 被击退怪物的自然位置恢复
                enemies.forEach(e => {
                    if (e.mesh.position.z < e.originalZ && e.hp > 0) {
                        e.mesh.position.z += 1.0 * delta; // 缓缓走回来
                    }
                });
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        window.onload = init;

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
